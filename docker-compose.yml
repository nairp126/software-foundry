
services:
  postgres:
    image: postgres:16-alpine
    container_name: foundry-postgres
    environment:
      POSTGRES_USER: foundry_user
      POSTGRES_PASSWORD: foundry_password
      POSTGRES_DB: foundry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundry_user -d foundry_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foundry-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.16-community
    container_name: foundry-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: foundry-api
    environment:
      DATABASE_URL: postgresql://foundry_user:foundry_password@postgres:5432/foundry_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_password
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL_NAME: qwen2.5-coder:1.5b
      HOST_GENERATED_PROJECTS_PATH: ${PWD}/generated_projects
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./generated_projects:/app/generated_projects
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: uvicorn foundry.main:app --host 0.0.0.0 --port 8000

  celery-worker:
    build: .
    container_name: foundry-celery-worker
    environment:
      DATABASE_URL: postgresql://foundry_user:foundry_password@postgres:5432/foundry_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_password
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL_NAME: qwen2.5-coder:1.5b
      HOST_GENERATED_PROJECTS_PATH: ${PWD}/generated_projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./generated_projects:/app/generated_projects
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: celery -A foundry.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
